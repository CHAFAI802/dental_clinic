services:
  db:
    image: postgres:16-alpine

    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dental # This sets the name of the database to "dental"
      POSTGRES_USER: dental # This sets the username for the database to "dental" to be modified
      POSTGRES_PASSWORD: dental # This sets the password for the database user to "dental"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental -d dental"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      API_EMAIL: ${API_EMAIL}
      API_PASSWORD: ${API_PASSWORD}
    volumes:
      - .:/app
      - media_data:/app/media 
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - web

volumes:
  postgres_data:
  media_data:
