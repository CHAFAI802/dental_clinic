services:
  db:
    image: postgres:16-alpine

    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dental
      POSTGRES_USER: dental
      POSTGRES_PASSWORD: dental
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental -d dental"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: changeme
      DATABASE_URL: postgres://dental:dental@db:5432/dental
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - .:/app
      - media_data:/app/media 
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  postgres_data:
  media_data:
